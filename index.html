    var forced = (params.get('force_region') || '').toLowerCase();

    function redirectTo(url) {
      window.location.replace(url);

    function buildUrl(baseUrl) {
      var next = new URL(baseUrl, window.location.href);
      params.forEach(function (value, key) {
        if (key !== 'force_region') next.searchParams.set(key, value);
      });
      if (window.location.hash) next.hash = window.location.hash;

    if (forced === 'global' || forced === 'intl' || forced === 'international' || forced === 'overseas') {
      redirectTo(buildUrl(GLOBAL_URL));
      return;

    var languages = Array.isArray(navigator.languages) && navigator.languages.length
      ? navigator.languages
      : [navigator.language || ''];
    var timeZone = '';
    try {
      timeZone = Intl.DateTimeFormat().resolvedOptions().timeZone || '';

    var isTaiwanLike = languages.some(function (lang) {
      return /zh-tw|zh-hant-tw/i.test(lang || '');

    if (!isTaiwanLike) {
      redirectTo(buildUrl(GLOBAL_URL));

  // 見證輪播
  var names = ['q12***554','a88***021','ys6***777','lin***391','w09***168','ch3***802','mia***456','k77***009','yu5***233','tw8***660'];
  var acts = ['已註冊。','剛領取首儲禮金 🎁','已出金 NT$12,800 💸','已註冊。','剛領取優惠碼 🎟️','已出金 NT$5,600 💸','已註冊。'];
  var tk = document.getElementById('tk'), i = 0;
  setInterval(function(){
    tk.style.opacity = 0;
    setTimeout(function(){
      i++;
      tk.textContent = names[i%names.length] + ' ' + acts[i%acts.length];
      tk.style.opacity = 1;
    }, 300);
  }, 2600);

  // 活動輪播
  var sls = document.querySelectorAll('.tv-frame .sl');
  var dots = document.querySelectorAll('.tv-dots i');
  var cur = 0;
  setInterval(function(){
    sls[cur].classList.remove('on'); dots[cur].classList.remove('on');
    cur = (cur+1) % sls.length;
    sls[cur].classList.add('on'); dots[cur].classList.add('on');
  }, 3000);

  // 夜豹步行狀態機: 面向行進方向+搖擺步+端點轉身
  (function(){
    var walker = document.querySelector('.world .walker');
    var mv = document.getElementById('leoModel');
    if (!walker || !mv) return;
    var RANGE = 78;          // 走動半徑 px
    var WALK_T = 4200;       // 單程時間
    var IDLE_T = 1600;       // 端點面向鏡頭停留
    var x = -RANGE, dir = 1; // 從左端出發往右
    function face(deg){ mv.cameraOrbit = deg + 'deg 85deg auto'; }
    function walk(){
      walker.classList.add(dir === 1 ? 'step-r' : 'step-l');
      face(dir === 1 ? 115 : 245);   // 側面朝行進方向
      var from = x, to = dir === 1 ? RANGE : -RANGE, t0 = null;
      function step(ts){
        if (!t0) t0 = ts;
        var k = Math.min((ts - t0) / WALK_T, 1);
        x = from + (to - from) * k;
        walker.style.transform = 'translateX(' + x + 'px)';
        if (k < 1) requestAnimationFrame(step);
        else { dir = -dir; idle(); }
      }
      requestAnimationFrame(step);
    }
    function idle(){
      walker.classList.remove('step-r','step-l');
      face(180);                     // 轉回來看鏡頭
      setTimeout(walk, IDLE_T);
    }
    mv.addEventListener('load', function(){ setTimeout(walk, 900); });
  })();

  // 3D 材質修正(去塑膠感)
  var lm = document.getElementById('leoModel');
  if (lm) lm.addEventListener('load', function(){
    try {
      lm.model.materials.forEach(function(m){
        m.pbrMetallicRoughness.setMetallicFactor(0.05);
        m.pbrMetallicRoughness.setRoughnessFactor(0.85);
      });
    } catch(e) {}
  });

</script>
